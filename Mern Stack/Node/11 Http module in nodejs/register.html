<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <blockquote>
        <hr>
        <a href="http://localhost:3000/home">Home</a>   |   
        <a href="http://localhost:3000/register">Register</a>      
        <hr>
        <h3>Register Page</h3>
        <form action="/viewInfo" method="get">
            <input
                type="text"
                placeholder="Enter Username"
                name="username"
                id="username"
            > <br>
            <input
                type="email"
                placeholder="Enter Email"
                name="email"
                id="email"
            > <br>
                        <input
                type="password"
                placeholder="Enter password"
                name="password"
                id="password"
            > <br>
                        <input
                type="text"
                placeholder="Enter Address"
                name="address"
                id="address"
            > <br>
                        <input
                type="submit"
                value="submit"
            >
              <input
                type="reset"
                value="reset"
            > <br>
        </form>
    </blockquote>
</body>
</html>
